name: Build MacOs Bundle

on: [push]


jobs:
  build-arm64:
    uses: ./.github/workflows/build-mac-flacon.yml
    name: arm64
    with:
      arch: arm64

  build-x86_64:
    uses: ./.github/workflows/build-mac-flacon.yml
    name: x86_64
    with:
      arch: x86_64


  flacon-app:
    runs-on: macos-latest

    needs:
      - build-arm64
      - build-x86_64

    steps:
    - uses: actions/checkout@v6

    - name: Set env
      run: |
        export "RELEASE_DATE=$(date +%Y.%m.%d_%H.%M.%S)"
        echo   "RELEASE_DATE=${RELEASE_DATE}" >> ${GITHUB_ENV}

        if [[ "${GITHUB_REF_TYPE}"  = "tag" ]]; then \
          export "RELEASE_VERSION=${GITHUB_REF_NAME:1}"; \
        else \
          export "RELEASE_VERSION=${RELEASE_DATE}"; \
        fi
        echo   "RELEASE_VERSION=${RELEASE_VERSION}" >> ${GITHUB_ENV}

        export "DMG_NAME=Flacon-${VERSION}.dmg"
        echo   "DMG_NAME=${DMG_NAME}" >> ${GITHUB_ENV}

        export "ARTIFACT_NAME=Flacon-${VERSION}.dmg"
        echo   "ARTIFACT_NAME=${ARTIFACT_NAME}" >> ${GITHUB_ENV}

        echo "--------------------------------------------"
        export
        echo "--------------------------------------------"
        cat ${GITHUB_ENV}
        echo "--------------------------------------------"


    - name: Create temporary keychain and import cert
      run: |
        echo "${{ secrets.CERT_P12_BASE64 }}" | base64 --decode > ./cert.p12
        KEYCHAIN_NAME=build.keychain
        KEYCHAIN_PASS=secretpass123
        security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_NAME"
        security default-keychain -s "$KEYCHAIN_NAME"
        security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_NAME"
        security set-keychain-settings -t 3600 -l "$KEYCHAIN_NAME"
        security import ./cert.p12 -k "$KEYCHAIN_NAME" -P "${{ secrets.CERT_P12_PASSWORD }}" -T /usr/bin/codesign -T /usr/bin/security >/dev/null
        security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_NAME" >/dev/null
        rm -rf ./cert.p12

        mkdir -p ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/
        echo "${{ secrets.PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/current.provisionprofile

        echo "${{ secrets.AC_PRIVATE_KEY_BASE64 }}" | base64 --decode > ./AuthKey.p8


    - name: Download arm64
      uses: actions/download-artifact@v4
      with:
        name: Flacon-arm64


    - name: Extract arm64
      env:
        ARCH: arm64
      shell: bash
      run: |
        mkdir -p ${{ env.ARCH }}
        tar xvf Flacon-${{env.ARCH}}.tar -C ${{env.ARCH}}


    - name: Download x86_64
      uses: actions/download-artifact@v4
      with:
        name: Flacon-x86_64


    - name: Extract x86_64
      env:
        ARCH: x86_64
      shell: bash
      run: |
        mkdir -p ${{ env.ARCH }}
        tar xvf Flacon-${{env.ARCH}}.tar -C ${{env.ARCH}}


    - name: Install tools
      shell: bash
      run: |
        git clone https://github.com/flacon/flacon.third-party.git ${HOME}/flacon.third-party
        mkdir -p ${HOME}/bin/
        cp ${HOME}/flacon.third-party/bin/* ${HOME}/bin/


    - name: Create universal application
      shell: bash
      run: |
        lipo-app x86_64/Flacon.app arm64/Flacon.app Flacon.app


    - name: Check external programs
      run: |
        ${{github.workspace}}/scripts/check-extprograms.sh . Flacon.app/Contents/MacOS


    - name: Check libraries
      shell: bash
      working-directory: ${{github.workspace}}
      run: |
        ${HOME}/bin/macdeploy.py check-libs Flacon.app


    - name: Sign application
      env:
        APP_NAME: Flacon
        APP_PATH: "${{ github.workspace }}/Flacon.app"

        CODE_SIGN_IDENTITY: "Developer ID Application: Alex Sokolov (635H9TYSZJ)"
        AC_KEY_ID: "${{ secrets.AC_KEY_ID }}"
        AC_ISSUER_ID: "${{ secrets.AC_ISSUER_ID }}"
      run: |
        echo "***********************************"
        echo "Removing quarantine flag..."
        echo "***********************************"
        xattr -r -d com.apple.quarantine "${APP_PATH}"
        echo "  OK"
        echo ""

        echo "***********************************"
        echo "Signing the bundle..."
        echo "***********************************"
        codesign --force --options runtime --deep --verify --sign  "${CODE_SIGN_IDENTITY}" "${APP_PATH}"
        echo "  OK"
        echo ""

        echo "***********************************"
        echo "** Verifying codesign and entitlements..."
        echo "***********************************"
        codesign --verify --deep --strict --verbose=2 "${APP_PATH}"
        echo ""
        echo "** VERIFICATION SUCCEEDED **"

        echo "***********************************"
        echo "** Build DMG file"
        echo "***********************************"
        "${{ github.workspace }}/.github/workflows/dmgbuild" -s "${{ github.workspace }}/.github/workflows/dmg_settings.json" "${APP_NAME}" "${DMG_NAME}")
        echo ""
        echo "** DMG CREATION SUCCEEDED ${DMG_NAME} **"


        echo ""
        echo "***********************************"
        echo "Submitting to Apple notary service..."
        echo "***********************************"

        DMG_PATH=$(ls ${BUILD_DIR}/*.dmg)
        echo "DMG FILE: ${DMG_PATH}"

        xcrun notarytool submit \
          --wait \
          --output-format json \
          --key "./AuthKey.p8" \
          --key-id "${AC_KEY_ID}" \
          --issuer "${AC_ISSUER_ID}" \
          "${ARGS[@]}" \
          "${DMG_PATH}" \
          | tee "${BUILD_DIR}/03-notarize.log"

        echo ""
        echo "** WAITING RESULT .... **"
        xcrun stapler staple "${DMG_PATH}"

        echo ""
        echo "***********************************"
        echo "** Verifying..."
        echo "***********************************"
        spctl -a -vvv -t install "${APP_PATH}" || spctl --assess --type execute --verbose=4 "${APP_PATH}"
        echo ""
        echo "** NOTARIZATION SUCCEEDED **"


    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: ${{ env.ARTIFACT_NAME }}
        path: "${{ env.DMG_NAME }}/*.dmg"

